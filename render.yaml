# Render Blueprint — deploys AdGuard as a persistent Node web service.
# Render runs `node server.js` (a real long-running Express server), which suits
# this app's architecture (stateful server + Postgres pool) far better than a
# serverless host. Push this file, then on render.com: New → Blueprint → pick
# the repo. Fill ANTHROPIC_API_KEY and the database vars in the dashboard.
services:
  - type: web
    name: falsead-detector
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENROUTER_API_KEY
        sync: false        # set in the Render dashboard (secret) — get from openrouter.ai
      - key: OPENROUTER_MODEL
        value: "anthropic/claude-sonnet-4-5"   # เปลี่ยน model ได้โดยไม่ต้อง redeploy — claude-opus-4 เคยพบไม่ตอบตาม JSON schema
      - key: SERPAPI_API_KEY
        sync: false        # ใช้ปุ่ม "ค้นหาตอนนี้" ในหน้าเฝ้าระวัง — สมัครได้ที่ serpapi.com (ไม่ใช่ serper.dev)
      # --- Login (set these in the dashboard) ---
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong random secret
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false           # first-run admin password (change after first login)
      # --- Supabase Postgres: use ONE of the two forms below ---
      # Form A (single URL — password must be percent-encoded if it has & ? * etc.)
      - key: DATABASE_URL
        sync: false
      # Form B (discrete vars — raw password OK; leave DATABASE_URL blank if you use these)
      # - key: PGHOST
      #   sync: false
      # - key: PGPORT
      #   value: "5432"
      # - key: PGUSER
      #   sync: false
      # - key: PGPASSWORD
      #   sync: false
      # - key: PGDATABASE
      #   value: postgres
