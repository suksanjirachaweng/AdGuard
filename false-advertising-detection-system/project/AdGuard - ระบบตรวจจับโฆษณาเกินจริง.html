  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

bottom:18px;\">\n              <div>\n                <div style=\"font-size:14px;font-weight:600;color:#16241d;\">ปริมาณการตรวจสอบรายสัปดาห์<\u002Fdiv>\n                <div style=\"font-size:11px;color:#7d8e86;font-family:'IBM Plex Mono',monospace;\">Weekly detection volume<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px;font-size:11px;color:#7d8e86;\">\n                <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#d64545;\"><\u002Fspan>เสี่ยงสูง<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#e0a92e;\"><\u002Fspan>ปานกลาง<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#2f9e6a;\"><\u002Fspan>ปลอดภัย<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:14px;height:170px;padding-top:10px;\">\n              <sc-for list=\"{{ chart }}\" as=\"d\" hint-placeholder-count=\"7\">\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;\">\n                  <div style=\"width:100%;max-width:34px;display:flex;flex-direction:column;border-radius:5px;overflow:hidden;\">\n                    <div style=\"height:{{ d.high }}px;background:#d64545;\"><\u002Fdiv>\n                    <div style=\"height:{{ d.mid }}px;background:#e0a92e;\"><\u002Fdiv>\n                    <div style=\"height:{{ d.safe }}px;background:#2f9e6a;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:10.5px;color:#9aa8a1;font-family:'IBM Plex Mono',monospace;\">{{ d.day }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- BY CATEGORY -->\n          <div style=\"background:#fff;border:1px solid #e2e9e5;border-radius:13px;padding:20px;\">\n            <div style=\"font-size:14px;font-weight:600;color:#16241d;margin-bottom:2px;\">หมวดสินค้าที่พบบ่อย<\u002Fdiv>\n            <div style=\"font-size:11px;color:#7d8e86;font-family:'IBM Plex Mono',monospace;margin-bottom:16px;\">Top flagged categories<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <sc-for list=\"{{ categories }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;\">\n                    <span style=\"color:#39473f;font-weight:500;\">{{ c.name }}<\u002Fspan>\n                    <span style=\"color:#7d8e86;font-family:'IBM Plex Mono',monospace;\">{{ c.count }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:7px;background:#eef2f0;border-radius:4px;overflow:hidden;\">\n                    <div style=\"width:{{ c.pct }}%;height:100%;background:{{ c.color }};border-radius:4px;animation:barGrow .8s ease;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- RECENT CASES -->\n        <div style=\"background:#fff;border:1px solid #e2e9e5;border-radius:13px;overflow:hidden;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #eef2f0;\">\n            <div>\n              <div style=\"font-size:14px;font-weight:600;color:#16241d;\">เคสล่าสุด · Recent cases<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ goCases }}\" style=\"background:none;border:1px solid #d8e2dc;border-radius:8px;padding:7px 13px;font-family:inherit;font-size:12px;color:#157347;font-weight:600;cursor:pointer;\" style-hover=\"background:#f1f5f3;\">ดูทั้งหมด →<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-for list=\"{{ recentCases }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ c.onClick }}\" style=\"display:grid;grid-template-columns:90px 1fr 130px 110px 90px;gap:14px;align-items:center;padding:13px 20px;border-bottom:1px solid #f3f6f4;cursor:pointer;\" style-hover=\"background:#f7faf8;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#7d8e86;\">{{ c.id }}<\u002Fspan>\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:13.5px;font-weight:500;color:#16241d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ c.title }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9aa8a1;font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ c.source }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"{{ c.riskBadge }}\">{{ c.riskTh }}<\u002Fspan>\n              <span style=\"font-size:12px;color:#7d8e86;\">{{ c.date }}<\u002Fspan>\n              <span style=\"{{ c.statusBadge }}\">{{ c.statusTh }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== NEW CHECK / UPLOAD ===================== -->\n      <sc-if value=\"{{ isUpload }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:820px;margin:0 auto;animation:fadeUp .4s ease;\">\n        <div style=\"background:#fff;border:1px solid #e2e9e5;border-radius:14px;padding:28px;\">\n          <div style=\"font-size:17px;font-weight:600;color:#16241d;margin-bottom:4px;\">ส่งข้อมูลเพื่อตรวจสอบ<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#7d8e86;margin-bottom:22px;\">เลือกแหล่งข้อมูล — ระบบ AI จะวิเคราะห์เนื้อหาโฆษณาเทียบกับกฎหมายและประกาศที่เกี่ยวข้อง<\u002Fdiv>\n\n          <!-- MODE TABS -->\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;\">\n            <sc-for list=\"{{ modes }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ m.onClick }}\" style=\"{{ m.style }}\">\n                <span style=\"font-size:22px;line-height:1;\">{{ m.icon }}<\u002Fspan>\n                <span style=\"font-size:13.5px;font-weight:600;\">{{ m.th }}<\u002Fspan>\n                <span style=\"font-size:10.5px;opacity:.7;font-family:'IBM Plex Mono',monospace;\">{{ m.en }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- LINK MODE -->\n          <sc-if value=\"{{ modeLink }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-bottom:18px;\">\n              <label style=\"font-size:12px;font-weight:600;color:#39473f;display:block;margin-bottom:8px;\">URL ของโฆษณา / โพสต์ / หน้าเว็บ<\u002Flabel>\n              <div style=\"display:flex;align-items:center;gap:10px;background:#f7faf8;border:1.5px solid #d8e2dc;border-radius:10px;padding:3px 4px 3px 14px;\" style-focus-within=\"border-color:#2f9e6a;\">\n                <span style=\"color:#9aa8a1;font-family:'IBM Plex Mono',monospace;font-size:13px;\">https://<\u002Fspan>\n                <input value=\"{{ linkValue }}\" oninput=\"{{ onLinkInput }}\" placeholder=\"shopee.co.th/slimx-pro-detox\" style=\"flex:1;border:none;background:none;outline:none;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:11px 0;color:#16241d;\">\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;\">\n                <span style=\"font-size:11px;color:#9aa8a1;align-self:center;\">ตัวอย่าง:<\u002Fspan>\n                <sc-for list=\"{{ examples }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                  <button onclick=\"{{ ex.onClick }}\" style=\"background:#eef4f1;border:1px solid #dce6e0;border-radius:7px;padding:5px 11px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#3d6b54;cursor:pointer;\" style-hover=\"background:#e2ede7;\">{{ ex.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- FILE / IMAGE MODE -->\n          <sc-if value=\"{{ modeDrop }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border:2px dashed #cdded4;border-radius:12px;background:#f7faf8;padding:42px 24px;text-align:center;margin-bottom:18px;cursor:pointer;\" style-hover=\"border-color:#2f9e6a;background:#f0f7f3;\">\n              <div style=\"width:58px;height:58px;border-radius:14px;background:#e6f1ea;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;\">{{ dropIcon }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:600;color:#16241d;margin-bottom:5px;\">{{ dropTitle }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#7d8e86;margin-bottom:16px;\">{{ dropHint }}<\u002Fdiv>\n              <button onclick=\"{{ onFakeUpload }}\" style=\"background:#fff;border:1px solid #d8e2dc;border-radius:9px;padding:9px 18px;font-family:inherit;font-size:12.5px;font-weight:600;color:#157347;cursor:pointer;\">เลือกไฟล์…<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasFile }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:12px;background:#eef4f1;border:1px solid #d8e6de;border-radius:10px;padding:12px 14px;margin-bottom:18px;\">\n                <div style=\"width:40px;height:40px;border-radius:8px;background:#2f9e6a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;\">🖼<\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-size:13px;font-weight:600;color:#16241d;\">{{ fileName }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#7d8e86;font-family:'IBM Plex Mono',monospace;\">{{ fileMeta }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"color:#2c7a4f;font-size:18px;\">✓<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n\n          <!-- OPTIONS -->\n          <div style=\"border-top:1px solid #eef2f0;padding-top:18px;margin-top:4px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;\">\n              <div style=\"font-size:12px;font-weight:600;color:#39473f;\">ขอบเขตการตรวจ · Detection scope<\u002Fdiv>\n              <button onclick=\"{{ openAddContext }}\" style=\"display:flex;align-items:center;gap:6px;background:#eef4f1;border:1px solid #cfe0d6;border-radius:8px;padding:6px 12px;font-family:inherit;font-size:11.5px;font-weight:600;color:#157347;cursor:pointer;\" style-hover=\"background:#e2ede7;\">✦ เพิ่มบริบทให้ AI<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;\">\n              <sc-for list=\"{{ scopeTags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n                <span style=\"{{ tag.style }}\">{{ tag.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SUBMIT -->\n          <button onclick=\"{{ onAnalyze }}\" style=\"{{ analyzeBtnStyle }}\">\n            <span style=\"font-size:17px;\">◎<\u002Fspan> วิเคราะห์ด้วย AI · Run AI Analysis\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ANALYZING OVERLAY -->\n      <sc-if value=\"{{ analyzing }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;inset:0;background:rgba(10,30,22,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;\">\n          <div style=\"background:#fff;border-radius:16px;padding:34px;width:440px;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:fadeUp .3s ease;\">\n            <div style=\"display:flex;align-items:center;g
